<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Fullstack JS - 100 Preguntes</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .quiz-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .progress-container {
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            min-height: 350px;
            display: flex;
            flex-direction: column;
        }

        .question-number {
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
        }

        h2 {
            margin: 0 0 25px 0;
            font-size: 1.4rem;
            line-height: 1.4;
        }

        .options {
            display: grid;
            gap: 12px;
            flex-grow: 1;
        }

        .option-btn {
            background: white;
            border: 2px solid #f3f4f6;
            padding: 16px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #f9fafb;
        }

        .option-btn.selected {
            border-color: var(--primary);
            background: #eef2ff;
            font-weight: 600;
        }

        .footer-btns {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
        }

        button.nav-btn {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-next { background: var(--primary); color: white; }
        .btn-next:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn-prev { background: #e5e7eb; color: #4b5563; }

        #result-screen { display: none; text-align: center; }
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 10px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            margin: 20px auto;
        }

        .error-log {
            text-align: left;
            margin-top: 30px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .error-card {
            background: #fff1f2;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid var(--error);
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-screen">
        <div class="progress-container">
            <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem;">
                <span id="progress-text">Pregunta 1 de 100</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <div class="card">
            <span class="question-number" id="q-num">Pregunta 1</span>
            <h2 id="q-text">Carregant...</h2>
            <div class="options" id="options-container"></div>
            
            <div class="footer-btns">
                <button class="nav-btn btn-prev" id="prev-btn" onclick="prevQuestion()" style="visibility: hidden;">Anterior</button>
                <button class="nav-btn btn-next" id="next-btn" onclick="nextQuestion()" disabled>Següent</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="card">
        <h1>Test Finalitzat</h1>
        <div class="score-circle" id="score-val">0/100</div>
        <p id="result-msg"></p>
        <div class="error-log" id="error-log"></div>
        <button class="nav-btn btn-next" style="margin-top:20px; width:100%" onclick="location.reload()">Reiniciar Test</button>
    </div>
</div>

        { q: "Quina sintaxi s'utilitza per exportar un mòdul en JavaScript (ES Modules)?", a: ["module.exports = ...", "export ...", "exports.xxx = ..."], c: 1 },

        { q: "Què ofereix Supabase?", a: ["Només hosting estàtic", "PostgreSQL gestionat, Auth, Storage (Backend-as-a-Service)", "Només CDN"], c: 1 },

        { q: "Com s'ha de configurar el camp 'Secret' d'un JWT?", a: ["Ha de ser una cadena pública", "Ha de ser una clau complexa guardada en variables d'entorn", "No és necessari si usem HTTPS"], c: 1 }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById('q-num').innerText = `Pregunta ${currentIdx + 1} de ${questions.length}`;
        document.getElementById('q-text').innerText = q.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = `option-btn ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
            btn.innerText = opt;
            btn.onclick = () => selectOption(i);
            container.appendChild(btn);
        });

        // Update progress
        const progress = ((currentIdx + 1) / questions.length) * 100;
        document.getElementById('progress-fill').style.width = `${progress}%`;
        document.getElementById('progress-text').innerText = `Pregunta ${currentIdx + 1} de ${questions.length}`;
        document.getElementById('percent-text').innerText = `${Math.round(progress)}%`;

        // Update Nav buttons
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === questions.length - 1 ? 'Finalitzar' : 'Següent';
        document.getElementById('next-btn').disabled = userAnswers[currentIdx] === null;
    }

    function selectOption(index) {
        userAnswers[currentIdx] = index;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach((b, i) => b.className = `option-btn ${i === index ? 'selected' : ''}`);
        document.getElementById('next-btn').disabled = false;
    }

    function nextQuestion() {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            loadQuestion();
        } else {
            showResults();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            loadQuestion();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        let score = 0;
        let errorsHTML = '';
        
        questions.forEach((q, i) => {
            if (userAnswers[i] === q.c) {
                score++;
            } else {
                errorsHTML += `
                    <div class="error-card">
                        <strong>${i+1}. ${q.q}</strong><br>
                        <span style="color:var(--error)">La teva resposta: ${q.a[userAnswers[i]] || 'Cap'}</span><br>
                        <span style="color:var(--success)">Correcta: ${q.a[q.c]}</span>
                    </div>
                `;
            }
        });

        document.getElementById('score-val').innerText = `${score}/100`;
        document.getElementById('result-msg').innerHTML = score > 70 ? "Molt bé! Estàs preparat/ada." : "Cal repassar una mica més.";
        document.getElementById('error-log').innerHTML = errorsHTML || "<p>Felicitats! Cap error.</p>";
    }

    loadQuestion();
</script>

</body>
</html>
